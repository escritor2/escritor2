name: Generate Advanced Metrics

on:
  # Atualiza métricas diariamente para manter estatísticas, conquistas e snippets recentes.
  schedule:
    - cron: "0 0 * * *"

  # Execução manual recomendada após push inicial do README.
  workflow_dispatch:

  # Reexecuta quando a branch main do perfil é atualizada.
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    name: Generate Lowlighter metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      # Gera github-metrics.svg na raiz do repositório.
      # README usa: https://raw.githubusercontent.com/escritor2/escritor2/main/github-metrics.svg
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: escritor2
          output_action: commit
          config_timezone: America/Sao_Paulo

          # Base pública do perfil, atividade, comunidade, repositórios e metadados.
          base: header, activity, community, repositories, metadata

          # Plugins selecionados para demonstrar consistência e senioridade técnica.
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, blade, batchfile, shell
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 365
          plugin_code: yes
          plugin_code_visibility: public
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
