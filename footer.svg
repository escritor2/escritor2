<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 120" width="850" height="120" style="background-color: #08080a; font-family: 'Segoe UI', -apple-system, sans-serif;">
  <defs>
    <!-- Gradiente de Fundo (Nebula Carmesim Sutil) -->
    <radialGradient id="nebula-footer" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#21030a" stop-opacity="0.7" />
      <stop offset="70%" stop-color="#08080a" stop-opacity="1" />
    </radialGradient>

    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="grid-subtle" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5" />
    </pattern>

    <!-- Gradiente para o ECG batendo -->
    <linearGradient id="ecg-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a0011" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#FF1A4B" stop-opacity="1.0" />
      <stop offset="100%" stop-color="#5a0011" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <style>
    .quote-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      font-weight: bold;
      fill: #CAD3F5;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
    }

    /* Animação do ECG (Batimento Cardíaco) */
    .ecg-line {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: run-ecg 5s linear infinite;
    }
    @keyframes run-ecg {
      0% { stroke-dashoffset: 1200; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Fundo com Grid e Nebula combinando com o Header -->
  <rect width="100%" height="100%" fill="#08080a" />
  <rect width="100%" height="100%" fill="url(#nebula-footer)" opacity="0.8" />
  <rect width="100%" height="100%" fill="url(#grid-subtle)" opacity="0.4" />

  <!-- Linha divisória carmesim superior -->
  <line x1="0" y1="0" x2="850" y2="0" stroke="#DC143C" stroke-width="1.2" opacity="0.25" />

  <!-- Citação centralizada verticalmente e horizontalmente -->
  <text x="425" y="52" text-anchor="middle" class="quote-text">
    “ Code is my craft. Performance is my passion. ”
  </text>

  <!-- Linha de Batimento Cardíaco (ECG) animada -->
  <path class="ecg-line" fill="none" stroke="url(#ecg-grad)" stroke-width="2.2" filter="url(#glow-red)"
    d="M 0,92 
       L 150,92 
       Q 160,92 165,87
       Q 170,82 175,92
       L 190,92 
       L 200,65 
       L 210,105 
       L 220,92 
       L 240,92
       Q 250,87 255,92
       L 450,92
       Q 460,92 465,87
       Q 470,82 475,92
       L 490,92 
       L 500,65 
       L 510,105 
       L 520,92 
       L 540,92
       Q 550,87 555,92
       L 850,92" />
</svg>
